<style>
  /* =========================================================
     PROJECT DETAIL PAGES, Pro design tokens
     Reuses styles.css for nav + glass-dark + tokens
     ========================================================= */

  body{background:var(--bg);color:var(--fg)}

  /* ---------- HERO ---------- */
  .pj-hero{
    padding:160px 40px 60px;max-width:1400px;margin:0 auto;
    border-bottom:1px solid var(--line);
    position:relative;
  }
  .pj-hero .idx{
    display:flex;flex-wrap:wrap;gap:14px 22px;align-items:center;
    font:500 11px/1 var(--mono);letter-spacing:.22em;
    color:var(--fg-dim);text-transform:uppercase;margin-bottom:40px;
  }
  .pj-hero .idx .n{color:var(--lime);font-weight:500}
  .pj-hero .idx .status{
    padding:5px 9px;border:1px solid var(--lime);
    color:var(--lime);font-size:9px;letter-spacing:.3em;
  }
  .pj-hero h1{
    font-family:var(--display);font-weight:400;
    font-size:clamp(34px,5.8vw,84px);line-height:1.02;letter-spacing:-.02em;
    color:var(--cream);margin-bottom:24px;text-wrap:balance;max-width:18ch;
  }
  .pj-hero h1 .dot{color:var(--lime)}
  .pj-hero .sub{
    font:400 clamp(16px,1.4vw,20px)/1.5 var(--sans);
    color:var(--fg-dim);max-width:62ch;margin-bottom:32px;
  }
  .pj-hero .scope{display:flex;flex-wrap:wrap;gap:8px}
  .pj-hero .scope span{
    font:500 10px/1 var(--mono);letter-spacing:.18em;
    text-transform:uppercase;color:var(--lime);
    border:1px solid rgba(200,255,61,0.4);
    padding:8px 12px;border-radius:999px;
    background:rgba(200,255,61,0.05);
  }
  .pj-hero .live-cta{
    display:inline-flex;align-items:center;gap:14px;margin-top:38px;
    padding:14px 22px;border-radius:999px;
    font:500 12px/1 var(--mono);letter-spacing:.22em;text-transform:uppercase;
    /* uses .glass-dark from styles.css for the visual */
  }
  .pj-hero .live-cta .arr{
    display:inline-block;
    font:500 13px/1 var(--mono);transition:transform .3s ease;
  }
  .pj-hero .live-cta:hover .arr{transform:translate(3px,-3px)}

  /* ---------- COVER ---------- */
  .pj-cover{padding:30px 40px 60px;max-width:1600px;margin:0 auto}
  .pj-cover .frame{
    aspect-ratio:16/9;background:#000;overflow:hidden;position:relative;
    border:1px solid var(--line-2);border-radius:14px;
  }
  .pj-cover .frame img,.pj-cover .frame video{
    width:100%;height:100%;object-fit:cover;display:block;
  }

  /* ---------- GRID META + BODY ---------- */
  .pj-grid{
    max-width:1400px;margin:0 auto;padding:60px 40px 80px;
    display:grid;grid-template-columns:260px 1fr;gap:80px;
    border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  }
  .pj-meta{position:sticky;top:96px;align-self:start}
  .pj-meta dt{
    font:500 10px/1 var(--mono);letter-spacing:.22em;
    text-transform:uppercase;color:var(--lime);margin-bottom:6px;
  }
  .pj-meta dd{
    font:400 14px/1.45 var(--sans);color:var(--cream);
    margin-bottom:24px;
  }
  .pj-meta dd.mono{
    font-family:var(--mono);font-size:12px;letter-spacing:.08em;
    color:var(--fg-dim);
  }

  .pj-body .intro{
    font:400 clamp(17px,1.6vw,22px)/1.55 var(--sans);
    color:var(--cream);max-width:60ch;margin-bottom:56px;
    padding-bottom:40px;border-bottom:1px solid var(--line);
  }
  .pj-body .section{margin-bottom:48px;max-width:62ch}
  .pj-body .section:last-child{margin-bottom:0}
  .pj-body .section h2{
    font-family:var(--display);font-weight:400;
    font-size:clamp(22px,2.6vw,32px);line-height:1.1;letter-spacing:-.01em;
    color:var(--cream);margin-bottom:18px;
  }
  .pj-body .section h2 .g{color:var(--lime);font-style:italic}
  .pj-body .section p{
    font:400 15px/1.7 var(--sans);color:var(--fg-dim);margin-bottom:14px;
  }
  .pj-body .section p:last-child{margin-bottom:0}

  /* ---------- GALLERY ---------- */
  .pj-gallery{
    max-width:1600px;margin:0 auto;padding:60px 40px;
    display:grid;grid-template-columns:repeat(auto-fit, minmax(360px, 1fr));
    gap:14px;
  }
  .pj-gallery .g{
    background:var(--bg-2);aspect-ratio:4/3;position:relative;overflow:hidden;
    cursor:zoom-in;border-radius:10px;border:1px solid var(--line);
  }
  .pj-gallery .g img,.pj-gallery .g video{
    width:100%;height:100%;object-fit:cover;display:block;
    transition:transform .7s cubic-bezier(.2,.8,.2,1);
  }
  .pj-gallery .g:hover img,.pj-gallery .g:hover video{transform:scale(1.04)}
  .pj-gallery .g .cap{
    position:absolute;bottom:12px;left:12px;
    font:500 10px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;
    color:var(--cream);background:rgba(12,13,10,0.72);
    padding:6px 10px;border-radius:6px;
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    pointer-events:none;
  }
  .pj-gallery .g::after{
    content:"⤢";position:absolute;top:12px;right:12px;
    font:500 16px/1 var(--mono);color:var(--lime);
    background:rgba(12,13,10,0.72);padding:6px 9px;border-radius:6px;
    opacity:0;transition:opacity .25s ease;pointer-events:none;
  }
  .pj-gallery .g:hover::after{opacity:1}

  /* ---------- LIGHTBOX ---------- */
  .pj-lb{
    position:fixed;inset:0;z-index:100;
    background:rgba(12,13,10,0.94);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    display:none;align-items:center;justify-content:center;padding:60px 80px;
    animation:lbFade .35s ease backwards;
  }
  .pj-lb.is-open{display:flex}
  .pj-lb.is-closing{animation:lbFadeOut .55s ease forwards}
  @keyframes lbFade{from{opacity:0}to{opacity:1}}
  @keyframes lbFadeOut{from{opacity:1}to{opacity:0}}
  /* Note: lightbox controls use prefixed `lb-*` class names to avoid colliding
     with the global `.nav` pill (position:fixed, width:1080px) on the home
     navbar, that conflict made the arrows drift in fullscreen. Each control
     is now positioned fixed relative to the viewport, never to the .pj-lb
     padding box, so they sit at exact 24px from each edge. */
  .pj-lb .lb-stage{max-width:100%;max-height:100%;display:flex;align-items:center;justify-content:center}
  .pj-lb .lb-stage img,.pj-lb .lb-stage video{
    max-width:100%;max-height:calc(100vh - 160px);width:auto;height:auto;
    object-fit:contain;display:block;border-radius:8px;
    box-shadow:0 20px 60px rgba(0,0,0,.6);
    transform-origin:center center;
    animation:lbZoom .58s cubic-bezier(.2,.8,.2,1) backwards;
  }
  .pj-lb.is-closing .lb-stage img,.pj-lb.is-closing .lb-stage video{
    animation:lbZoomOut .55s cubic-bezier(.4,0,.6,1) forwards;
  }
  @keyframes lbZoom{from{transform:scale(0);opacity:0;filter:blur(6px)}to{transform:scale(1);opacity:1;filter:blur(0)}}
  @keyframes lbZoomOut{from{transform:scale(1);opacity:1;filter:blur(0)}to{transform:scale(0);opacity:0;filter:blur(6px)}}
  .pj-lb .lb-close,.pj-lb .lb-arrow{
    position:fixed;
    z-index:101;padding:0;
    background:rgba(241,236,224,0.06);
    border:1px solid rgba(241,236,224,0.18);
    color:var(--cream);cursor:pointer;display:flex;align-items:center;justify-content:center;
    border-radius:999px;
    transition:background .2s ease,color .2s ease,border-color .2s ease;
  }
  .pj-lb .lb-close:hover,.pj-lb .lb-arrow:hover{
    background:var(--lime);color:var(--ink);border-color:var(--lime);
  }
  .pj-lb .lb-close{top:24px;right:24px;width:48px;height:48px}
  .pj-lb .lb-arrow{top:50%;transform:translateY(-50%);width:54px;height:54px}
  .pj-lb .lb-prev{left:24px}
  .pj-lb .lb-next{right:24px}
  /* SVG icons inside the controls: perfectly centered via flex */
  .pj-lb .lb-close svg,.pj-lb .lb-arrow svg{
    width:20px;height:20px;display:block;
  }
  .pj-lb .lb-arrow svg{width:22px;height:22px}
  .pj-lb .lb-meta{
    position:fixed;bottom:24px;left:24px;right:24px;z-index:101;
    display:flex;justify-content:space-between;align-items:center;gap:20px;
    font:500 11px/1.4 var(--mono);letter-spacing:.2em;text-transform:uppercase;
    color:var(--cream);pointer-events:none;
  }
  .pj-lb .lb-meta .lb-cap{
    background:rgba(12,13,10,0.7);padding:8px 14px;border-radius:6px;
    border:1px solid rgba(241,236,224,0.10);
  }
  .pj-lb .lb-meta .lb-counter{
    color:var(--lime);background:rgba(12,13,10,0.7);
    padding:8px 14px;border-radius:6px;
    border:1px solid rgba(200,255,61,0.5);white-space:nowrap;
  }
  body.lb-open{overflow:hidden}
  @media (max-width:820px){
    .pj-lb{padding:50px 12px}
    .pj-lb .lb-close{top:14px;right:14px;width:42px;height:42px}
    .pj-lb .lb-arrow{width:44px;height:44px}
    .pj-lb .lb-prev{left:8px}
    .pj-lb .lb-next{right:8px}
    .pj-lb .lb-meta{bottom:12px;left:12px;right:12px;flex-direction:column;align-items:stretch}
  }

  /* ---------- PERFORMANCE HUD ---------- */
  .pj-stats{
    max-width:1400px;margin:0 auto;
    padding:80px 40px;
    border-top:1px solid var(--line);
    position:relative;
  }
  .pj-stats::before{
    content:"";position:absolute;inset:80px 40px;
    background:
      linear-gradient(180deg, rgba(200,255,61,0.04), transparent 60%),
      repeating-linear-gradient(0deg, rgba(241,236,224,0.025) 0 1px, transparent 1px 4px);
    pointer-events:none;
    border:1px solid var(--line-2);
    border-radius:12px;
  }
  .pj-stats-head{
    position:relative;z-index:1;
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 22px;
    border:1px solid var(--line-2);
    border-bottom:none;
    border-radius:12px 12px 0 0;
    background:rgba(20,21,17,0.6);
    backdrop-filter:blur(6px);
  }
  .pj-stats-eyebrow{
    font:500 11px/1 var(--mono);letter-spacing:0.22em;
    text-transform:uppercase;color:var(--lime);
    display:inline-flex;align-items:center;gap:10px;
  }
  .pj-stats-dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--lime);
    box-shadow:0 0 8px var(--lime);
    animation:pj-stats-pulse 1.4s ease-in-out infinite;
  }
  @keyframes pj-stats-pulse{
    0%,100%{opacity:0.4;transform:scale(0.85)}
    50%{opacity:1;transform:scale(1)}
  }
  .pj-stats-meta{
    display:inline-flex;align-items:center;gap:14px;
    font:500 10px/1 var(--mono);letter-spacing:0.22em;
    text-transform:uppercase;color:var(--fg-mute);
  }
  .pj-stats-rec{
    color:var(--lime);
    animation:pj-stats-rec-blink 1.2s ease-in-out infinite;
  }
  @keyframes pj-stats-rec-blink{
    0%,100%{opacity:1}
    50%{opacity:0.35}
  }
  .pj-stats-id{padding:4px 8px;border:1px solid var(--line-2);border-radius:4px;color:var(--cream)}

  .pj-stats-grid{
    position:relative;z-index:1;
    display:grid;grid-template-columns:repeat(3, 1fr);
    gap:0;
    border:1px solid var(--line-2);
    background:rgba(12,13,10,0.4);
    backdrop-filter:blur(6px);
    perspective:1400px;
  }
  /* Each stat is a button so the entire face is clickable + keyboard accessible */
  .pj-stat{
    /* clear default <button> visuals */
    appearance:none;-webkit-appearance:none;
    background:transparent;color:inherit;font:inherit;text-align:left;
    border:none;
    /* grid cell sizing */
    padding:0;
    min-height:210px;
    border-right:1px solid var(--line);
    border-bottom:1px solid var(--line);
    position:relative;
    cursor:pointer;
    transition:background .25s ease;
  }
  .pj-stat:focus{outline:none}
  .pj-stat:focus-visible .pj-stat-inner{
    box-shadow:0 0 0 2px rgba(200,255,61,0.45) inset;
  }
  .pj-stat:nth-child(3n){border-right:none}
  .pj-stat:nth-last-child(-n+3){border-bottom:none}
  .pj-stat:hover{background:rgba(200,255,61,0.04)}
  /* 3D flip mechanism */
  .pj-stat-inner{
    position:relative;width:100%;height:100%;min-height:210px;
    transform-style:preserve-3d;
    transition:transform .85s cubic-bezier(.2,.8,.2,1);
  }
  .pj-stat.is-flipped .pj-stat-inner{transform:rotateY(180deg)}
  .pj-stat-face{
    position:absolute;inset:0;
    padding:24px 22px;
    display:flex;flex-direction:column;gap:6px;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
  }
  .pj-stat-face--back{
    transform:rotateY(180deg);
    background:linear-gradient(180deg, rgba(20,21,17,0.92) 0%, rgba(12,13,10,0.88) 100%);
    justify-content:space-between;
  }
  .pj-stat--good .pj-stat-face--back{
    border-left:2px solid var(--lime);
  }
  .pj-stat--neutral .pj-stat-face--back{
    border-left:2px solid var(--fg-mute);
  }
  .pj-stat-back-head{
    font:500 10px/1.3 var(--mono);letter-spacing:0.22em;
    text-transform:uppercase;color:var(--lime);
  }
  .pj-stat--neutral .pj-stat-back-head{color:var(--fg-dim)}
  .pj-stat-back-body{
    font:400 13.5px/1.6 var(--sans);color:var(--cream);
    flex:1;display:flex;align-items:center;
  }
  .pj-stat-back-foot{
    display:flex;align-items:center;gap:8px;
    font:500 10px/1 var(--mono);letter-spacing:0.18em;
    text-transform:uppercase;color:var(--fg-mute);
    padding-top:10px;border-top:1px solid var(--line);
  }
  .pj-stat-back-foot span:first-child{color:var(--lime);font-size:14px}

  .pj-stat-lbl{
    font:500 10px/1 var(--mono);letter-spacing:0.20em;
    text-transform:uppercase;color:var(--fg-mute);
  }
  .pj-stat-val{display:flex;align-items:baseline;gap:6px;margin-top:4px}
  .pj-stat-num{
    font-family:var(--serif);font-style:italic;font-weight:400;
    font-size:44px;line-height:1;letter-spacing:-0.02em;
    color:var(--cream);
    padding-right:0.1em;margin-right:-0.1em;
  }
  .pj-stat--good .pj-stat-num{
    background:linear-gradient(95deg, var(--lime) 0%, var(--lime) 55%, var(--cream) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .pj-stat-unit{
    font-family:var(--mono);font-size:12px;letter-spacing:0.12em;
    color:var(--fg-mute);text-transform:uppercase;
  }
  .pj-stat-bar{
    margin-top:10px;height:3px;background:rgba(241,236,224,0.08);border-radius:2px;
    overflow:hidden;position:relative;
  }
  .pj-stat-bar-fill{
    position:absolute;inset:0;
    background:linear-gradient(90deg, var(--lime) 0%, var(--lime-2) 100%);
    transform-origin:left center;
    transform:scaleX(0);
    animation:pj-stat-fill 1.4s cubic-bezier(.2,.7,.2,1) forwards;
    animation-delay:calc(0.12s * var(--i, 0));
  }
  .pj-stat--neutral .pj-stat-bar-fill{
    background:linear-gradient(90deg, var(--fg-dim) 0%, var(--fg-mute) 100%);
  }
  @keyframes pj-stat-fill{
    from{transform:scaleX(0)}
    to{transform:scaleX(1)}
  }
  .pj-stat-note{
    margin-top:8px;
    font:400 11.5px/1.45 var(--sans);color:var(--fg-dim);
    flex:1;
  }
  .pj-stat-cta{
    display:flex;align-items:center;gap:8px;
    padding-top:10px;border-top:1px solid var(--line);
    font:500 10px/1 var(--mono);letter-spacing:0.18em;
    text-transform:uppercase;color:var(--fg-mute);
    transition:color .25s ease;
  }
  .pj-stat:hover .pj-stat-cta{color:var(--lime)}
  .pj-stat-cta span:first-child{color:var(--lime);font-size:14px;transition:transform .5s cubic-bezier(.2,.7,.2,1)}
  .pj-stat:hover .pj-stat-cta span:first-child{transform:rotate(90deg)}

  .pj-stats-foot{
    position:relative;z-index:1;
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 22px;
    border:1px solid var(--line-2);
    border-top:none;
    border-radius:0 0 12px 12px;
    background:rgba(20,21,17,0.6);
    font:500 10px/1 var(--mono);letter-spacing:0.18em;
    text-transform:uppercase;color:var(--fg-mute);
  }
  .pj-stats-foot-l{color:var(--cream)}

  @media (prefers-reduced-motion:reduce){
    .pj-stats-dot, .pj-stats-rec{animation:none}
    .pj-stat-bar-fill{animation:none;transform:scaleX(1)}
  }

  @media (max-width:820px){
    .pj-stats{padding:60px 24px}
    .pj-stats::before{inset:60px 24px}
    .pj-stats-grid{grid-template-columns:1fr 1fr}
    .pj-stat:nth-child(3n){border-right:1px solid var(--line)}
    .pj-stat:nth-child(2n){border-right:none}
    .pj-stat:nth-last-child(-n+3){border-bottom:1px solid var(--line)}
    .pj-stat:nth-last-child(-n+2){border-bottom:none}
    .pj-stats-head,.pj-stats-foot{flex-direction:column;gap:8px;text-align:center}
  }

  /* ---------- QUOTE ---------- */
  .pj-quote{
    max-width:980px;margin:0 auto;padding:90px 40px;text-align:center;
    border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  }
  .pj-quote blockquote{
    font-family:var(--display);font-weight:400;font-style:italic;
    font-size:clamp(24px,2.8vw,42px);line-height:1.3;
    color:var(--cream);margin-bottom:22px;
  }
  .pj-quote blockquote::before{content:"« ";color:var(--lime);font-style:normal}
  .pj-quote blockquote::after{content:" »";color:var(--lime);font-style:normal}
  .pj-quote .author{
    font:500 11px/1 var(--mono);letter-spacing:.22em;text-transform:uppercase;
    color:var(--fg-mute);
  }
  .pj-quote .author::before{content:"";color:var(--lime)}

  /* ---------- NEXT PROJECT ---------- */
  .pj-next{
    padding:90px 40px;text-align:center;border-bottom:1px solid var(--line);
  }
  .pj-next .lbl{
    font:500 11px/1 var(--mono);letter-spacing:.22em;text-transform:uppercase;
    color:var(--fg-mute);margin-bottom:24px;
  }
  .pj-next .t{
    font-family:var(--display);font-weight:400;font-style:italic;
    font-size:clamp(34px,5.5vw,76px);line-height:1;letter-spacing:-.02em;
    color:var(--cream);transition:color .2s ease;
  }
  .pj-next a:hover .t{
    background:linear-gradient(95deg, var(--lime) 0%, var(--lime) 50%, var(--cream) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .pj-next .arr{
    display:inline-block;margin-left:12px;color:var(--lime);

    transition:transform .3s ease;

  .pj-next a:hover .arr{transform:translateX(10px)}

  /* ---------- FOOTER ---------- */
  .pj-foot{

  /* ---------- 404 ---------- */
  .pj-error{padding:180px 40px 120px;text-align:center;max-width:620px;margin:0 auto}
  .pj-error h1{
    font-family:var(--display);font-weight:400;font-style:italic;
    font-size:clamp(80px,14vw,160px);line-height:.9;letter-spacing:-.04em;
    margin-bottom:20px;
    background:linear-gradient(95deg, var(--lime) 0%, var(--lime) 50%, var(--cream) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .pj-error p{
    font:400 16px/1.55 var(--sans);color:var(--fg-dim);margin-bottom:26px;
  }
  .pj-error a{
    color:var(--lime);border-bottom:1px solid var(--lime);padding-bottom:2px;
  }

  @media (max-width:820px){
    .pj-grid{grid-template-columns:1fr;gap:48px;padding:48px 24px 60px}
    .pj-meta{position:static}
    .pj-hero{padding:130px 24px 60px}
    .pj-cover{padding:18px 24px 40px}
    .pj-gallery{padding:40px 24px;grid-template-columns:1fr;gap:12px}
    .pj-quote{padding:60px 24px}

    .pj-foot{padding:24px;flex-direction:column;align-items:flex-start}
    .pj-foot a{margin-left:0;margin-right:18px}

</style>

  <button class="lb-close" id="pjLbClose" aria-label="Fermer">

<script>window.MM_PROJECT_ID = "01";</script>
<script src="projects.js"></script>
<script>
(() => {
  const esc = (s) => String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

  const params = new URLSearchParams(location.search);
  // Static pre-rendered pages set window.MM_PROJECT_ID inline. Query string is the fallback.
  const id = window.MM_PROJECT_ID || params.get('id');
  const data = (window.MM_PROJECTS || {})[id];
  const root = document.getElementById('pjRoot');

  if(!data){
    root.innerHTML = `
      <section class="pj-error">
        <h1>404</h1>
        <p>Ce projet n'existe pas ou n'a pas encore été publié.</p>
        <a href="index.html#projets">← Retour aux réalisations</a>
      </section>`;
    document.title = '404 · Mad Makers';
    const r = document.querySelector('meta[name="robots"]');
    if (r) r.setAttribute('content', 'noindex,follow');
    return;
  }

  // Placeholder projects: do not index.
  if (data.status === 'Placeholder') {
    const r = document.querySelector('meta[name="robots"]');
    if (r) r.setAttribute('content', 'noindex,follow,max-image-preview:large');
  }

  // === SEO META INJECTION (per project) ===
  const SITE_ORIGIN = 'https://www.mad-makers.fr';
  const pageUrl  = `${SITE_ORIGIN}/project-${encodeURIComponent(id)}.html`;
  const pageTitle = `${data.title} · Mad Makers`;
  const pageDesc  = (data.subtitle || data.intro || '').slice(0, 160);
  const coverSrc  = data.cover && data.cover.src
    ? (/^https?:/i.test(data.cover.src) ? data.cover.src : `${SITE_ORIGIN}/${data.cover.src}`)
    : `${SITE_ORIGIN}/assets/og-home.jpg`;
  const ogImage = data.cover && data.cover.type === 'video' && data.cover.poster
    ? `${SITE_ORIGIN}/${data.cover.poster}`
    : (data.cover && data.cover.type === 'image' ? coverSrc : `${SITE_ORIGIN}/assets/og-home.jpg`);

  document.title = pageTitle;
  const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el) el.setAttribute('content', val); };
  const setLink = (sel, val) => { const el = document.querySelector(sel); if (el) el.setAttribute('href', val); };
  setMeta('meta[name="description"]', pageDesc);
  setMeta('meta[property="og:title"]', pageTitle);
  setMeta('meta[property="og:description"]', pageDesc);
  setMeta('meta[property="og:url"]', pageUrl);
  setMeta('meta[property="og:image"]', ogImage);
  setMeta('meta[name="twitter:title"]', pageTitle);
  setMeta('meta[name="twitter:description"]', pageDesc);
  setMeta('meta[name="twitter:image"]', ogImage);
  setLink('link[rel="canonical"]', pageUrl);

  // JSON-LD CreativeWork + Breadcrumb for this project
  const ld = document.createElement('script');
  ld.type = 'application/ld+json';
  ld.textContent = JSON.stringify({
    '@context': 'https://schema.org',
    '@graph': [
      {
        '@type': 'CreativeWork',
        '@id': `${pageUrl}#work`,
        'name': data.title,
        'description': pageDesc,
        'image': ogImage,
        'creator': {'@type': 'Organization', 'name': 'Mad Makers', 'url': `${SITE_ORIGIN}/`},
        'dateCreated': data.year || '',
        'inLanguage': 'fr-FR',
        'about': (data.scope || []).join(', ')
      },
      {
        '@type': 'BreadcrumbList',
        'itemListElement': [
          {'@type':'ListItem','position':1,'name':'Accueil','item':`${SITE_ORIGIN}/`},
          {'@type':'ListItem','position':2,'name':'Réalisations','item':`${SITE_ORIGIN}/#projets`},
          {'@type':'ListItem','position':3,'name':data.title}
        ]
      }
    ]
  });
  document.head.appendChild(ld);

  // Helper: serve WebP first with PNG/JPG fallback. Only swaps for local assets.
  const toWebp = (src) => /^https?:/i.test(src)
    ? src
    : src.replace(/\.(png|jpe?g)(\?.*)?$/i, '.webp$2');
  const picture = (src, alt, extra='') => {
    const webp = toWebp(src);
    if (webp === src) return `<img src="${esc(src)}" alt="${esc(alt)}" ${extra}/>`;
    return `<picture><source type="image/webp" srcset="${esc(webp)}"/><img src="${esc(src)}" alt="${esc(alt)}" ${extra}/></picture>`;
  };

  const coverHtml = data.cover.type === 'video'
    ? `<video src="${esc(data.cover.src)}" muted loop playsinline autoplay preload="metadata"${data.cover.poster ? ` poster="${esc(data.cover.poster)}"` : ''}></video>`
    : picture(data.cover.src, data.title, 'fetchpriority="high" decoding="async"');

  const scopeHtml = (data.scope || []).map(s => `<span>${esc(s)}</span>`).join('');

  const sectionsHtml = (data.sections || []).map(s => `
    <div class="section">
      <h2>${esc(s.title)}<span class="g">.</span></h2>
      <p>${esc(s.body)}</p>
    </div>`).join('');

  const galleryHtml = (data.gallery || []).map(g => `
    <div class="g">
      ${g.type === 'video'
        ? `<video src="${esc(g.src)}" muted loop playsinline autoplay preload="metadata"></video>`
        : picture(g.src, g.caption || '', 'loading="lazy" decoding="async"')}
      ${g.caption ? `<div class="cap">${esc(g.caption)}</div>` : ''}
    </div>`).join('');

  // Map tone -> short label for the back of the flip card
  const toneLabel = { good: "Pourquoi c'est bien", neutral: "Pourquoi c'est neutre", bad: "Pourquoi ça pourrait être mieux" };

  const statsHtml = (data.stats && data.stats.length) ? `
    <section class="pj-stats">
      <div class="pj-stats-head">
        <div class="pj-stats-eyebrow"><span class="pj-stats-dot"></span> PERFORMANCE · TECHNICAL READOUT</div>
        <div class="pj-stats-meta"><span class="pj-stats-rec">● REC</span> <span class="pj-stats-id">${esc(data.num)} / LIVE</span></div>
      </div>
      <div class="pj-stats-grid">
        ${data.stats.map((s, i) => {
          const tone = esc(s.tone || 'neutral');
          const backTitle = esc(toneLabel[s.tone] || toneLabel.neutral);
          return `
          <button type="button" class="pj-stat pj-stat--${tone}" style="--i:${i}" aria-label="Voir l'analyse de ${esc(s.lbl)}">
            <div class="pj-stat-inner">
              <div class="pj-stat-face pj-stat-face--front">
                <div class="pj-stat-lbl">${esc(s.lbl)}</div>
                <div class="pj-stat-val">
                  <span class="pj-stat-num">${esc(s.val)}</span>${s.unit ? `<span class="pj-stat-unit">${esc(s.unit)}</span>` : ''}
                </div>
                <div class="pj-stat-bar"><span class="pj-stat-bar-fill"></span></div>
                ${s.note ? `<div class="pj-stat-note">${esc(s.note)}</div>` : ''}
                <div class="pj-stat-cta" aria-hidden="true"><span>↻</span><span>analyse</span></div>
              </div>
              <div class="pj-stat-face pj-stat-face--back">
                <div class="pj-stat-back-head">${backTitle}</div>
                <div class="pj-stat-back-body">${esc(s.why || s.note || '')}</div>
                <div class="pj-stat-back-foot"><span>↺</span><span>retour</span></div>
              </div>
            </div>
          </button>
          `;
        }).join('')}
      </div>
      <div class="pj-stats-foot">
        <span class="pj-stats-foot-l">SOURCE / ${esc(data.liveUrl || 'mad-makers.fr')}</span>
        <span class="pj-stats-foot-r">CLIQUEZ UNE STAT POUR VOIR L'ANALYSE, TTFB mesuré via curl edge, ${new Date().getFullYear()}</span>
      </div>
    </section>` : '';

  const quoteHtml = data.quote ? `
    <section class="pj-quote">
      <blockquote>${esc(data.quote.text)}</blockquote>
      <div class="author">${esc(data.quote.author)}</div>
    </section>` : '';

  const nextProj = data.next ? (window.MM_PROJECTS || {})[data.next] : null;
  const nextHtml = nextProj ? `
    <section class="pj-next">
      <div class="lbl">Projet suivant</div>
      <a href="project-${esc(data.next)}.html">
        <span class="t">${esc(nextProj.title)}</span><span class="arr">→</span>
      </a>
    </section>` : '';

  const statusBadge = data.status ? `<span class="status">${esc(data.status)}</span>` : '';
  const liveCta = data.liveUrl
    ? `<a class="live-cta glass-dark" href="${esc(data.liveUrl)}" target="_blank" rel="noopener">Voir le site en ligne <span class="arr">↗</span></a>`
    : '';

  root.innerHTML = `
    <section class="pj-hero">
      <div class="idx">
        <span class="n">${esc(data.num)}</span>
        <span>· ${esc(data.year)}</span>
        <span>· ${esc(data.client)}</span>
        ${statusBadge}
      </div>
      <h1>${esc(data.title)}<span class="dot">.</span></h1>
      <p class="sub">${esc(data.subtitle)}</p>
      <div class="scope">${scopeHtml}</div>
      ${liveCta}
    </section>

    <section class="pj-cover">
      <div class="frame">${coverHtml}</div>
    </section>

    <section class="pj-grid">
      <dl class="pj-meta">
        <dt>Client</dt><dd>${esc(data.client)}</dd>
        <dt>Année</dt><dd class="mono">${esc(data.year)}</dd>
        <dt>Rôle</dt><dd>${esc(data.role)}</dd>
        <dt>Durée</dt><dd>${esc(data.duration)}</dd>
        <dt>Stack</dt><dd class="mono">${(data.stack || []).map(esc).join(' · ')}</dd>
      </dl>
      <div class="pj-body">
        <p class="intro">${esc(data.intro)}</p>
        ${sectionsHtml}
      </div>
    </section>

    ${galleryHtml ? `<section class="pj-gallery">${galleryHtml}</section>` : ''}

    ${statsHtml}

    ${quoteHtml}
    ${nextHtml}

    <footer class="pj-foot">
      <span>© Mad Makers · <b>Dream it. We make it.</b></span>
      <span>
        <a href="index.html">↑ Accueil</a>
        <a href="index.html#contact">Brief →</a>
      </span>
    </footer>
  `;

  // === LIGHTBOX (gallery zoom) ===
  const gallery = data.gallery || [];
  if(gallery.length){
    const lb       = document.getElementById('pjLb');
    const lbStage  = document.getElementById('pjLbStage');
    const lbCap    = document.getElementById('pjLbCap');
    const lbCount  = document.getElementById('pjLbCounter');
    const lbClose  = document.getElementById('pjLbClose');
    const lbPrev   = document.getElementById('pjLbPrev');
    const lbNext   = document.getElementById('pjLbNext');
    let lbIdx = 0;

    const renderLb = () => {
      const item = gallery[lbIdx];
      lbStage.innerHTML = item.type === 'video'
        ? `<video src="${esc(item.src)}" controls autoplay loop playsinline></video>`
        : picture(item.src, item.caption || '', 'decoding="async"');
      lbCap.textContent   = item.caption || '';
      lbCount.textContent = `${lbIdx + 1} / ${gallery.length}`;
    };

    const openLb = (i) => {
      lbIdx = ((i % gallery.length) + gallery.length) % gallery.length;
      lb.classList.remove('is-closing');
      renderLb();
      lb.classList.add('is-open');
      document.body.classList.add('lb-open');
    };
    let closing = false;
    const closeLb = () => {
      if (closing || !lb.classList.contains('is-open')) return;
      closing = true;
      lb.classList.add('is-closing');
      setTimeout(() => {
        lb.classList.remove('is-open', 'is-closing');
        document.body.classList.remove('lb-open');
        closing = false;
      }, 550);
    };
    const stepLb = (dir) => {
      lbIdx = ((lbIdx + dir) % gallery.length + gallery.length) % gallery.length;
      renderLb();
    };

    // delegated click on .pj-gallery .g
    document.querySelectorAll('.pj-gallery .g').forEach((el, i) => {
      el.addEventListener('click', () => openLb(i));
    });

    lbClose.addEventListener('click', closeLb);
    lbPrev.addEventListener('click',  () => stepLb(-1));
    lbNext.addEventListener('click',  () => stepLb( 1));
    lb.addEventListener('click', (e) => { if (e.target === lb) closeLb(); });
    document.addEventListener('keydown', (e) => {
      if (!lb.classList.contains('is-open')) return;
      if (e.key === 'Escape')      closeLb();
      if (e.key === 'ArrowLeft')   stepLb(-1);
      if (e.key === 'ArrowRight')  stepLb( 1);
    });
  }

  // === STAT FLIP, click any HUD stat to reveal its analysis (back face) ===
  document.querySelectorAll('.pj-stat').forEach((el) => {
    el.addEventListener('click', () => el.classList.toggle('is-flipped'));
  });
})();
</script>
