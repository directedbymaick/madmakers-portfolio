<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<!-- FAVICONS -->

<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>

<!-- Bunny Fonts (drop-in Google Fonts, EU-hosted, RGPD-compliant) -->
<link rel="preconnect" href="https://fonts.bunny.net" crossorigin/>
<link rel="stylesheet" href="https://fonts.bunny.net/css2?family=Archivo+Black&family=Archivo:wght@400;500;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"/>
<style>
  :root{
    --bg:#0a0a0a;--ink:#fff;--dim:#888;--soft:#c8c8c8;--line:#1f1f1f;
    --green:#39ff14;
    --mono:"JetBrains Mono",ui-monospace,monospace;
    --display:"Archivo Black","Archivo",system-ui,sans-serif;
    --sans:"Inter","Archivo",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
  a{color:inherit;text-decoration:none}
  img,video{display:block;max-width:100%}
  ::selection{background:var(--green);color:#000}

  /* Nav */
  .pj-nav{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:16px 28px;background:rgba(10,10,10,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line);font:500 11px/1 var(--mono);letter-spacing:.2em;text-transform:uppercase;color:var(--dim)}
  .pj-nav .logo{font:900 13px/1 var(--display);color:#fff;letter-spacing:.04em}
  .pj-nav .logo .g{color:var(--green)}
  .pj-nav .back{transition:color .2s ease}
  .pj-nav .back::before{content:"← ";color:var(--green);margin-right:2px}
  .pj-nav .back:hover{color:var(--green)}

  /* Hero */
  .pj-hero{padding:160px 40px 80px;max-width:1400px;margin:0 auto;border-bottom:1px solid var(--line)}
  .pj-hero .idx{display:flex;flex-wrap:wrap;gap:14px 22px;align-items:center;font:500 11px/1 var(--mono);letter-spacing:.25em;color:var(--dim);text-transform:uppercase;margin-bottom:40px}
  .pj-hero .idx .n{color:var(--green)}
  .pj-hero .idx .status{padding:5px 9px;border:1px solid var(--green);color:var(--green);font-size:9px;letter-spacing:.3em}
  .pj-hero h1{font:900 clamp(46px,9vw,150px)/.88 var(--display);text-transform:uppercase;letter-spacing:-.04em;margin-bottom:26px}
  .pj-hero h1 .dot{color:var(--green)}
  .pj-hero .sub{font:400 clamp(17px,1.6vw,22px)/1.45 var(--sans);color:var(--soft);max-width:62ch;margin-bottom:32px}
  .pj-hero .scope{display:flex;flex-wrap:wrap;gap:8px}
  .pj-hero .scope span{font:500 10px/1 var(--mono);letter-spacing:.2em;text-transform:uppercase;color:var(--green);border:1px solid var(--green);padding:8px 12px}
  .pj-hero .live-cta{display:inline-flex;align-items:center;gap:14px;margin-top:38px;padding:16px 26px;background:var(--green);color:#000;font:500 11px/1 var(--mono);letter-spacing:.28em;text-transform:uppercase;border:1px solid var(--green);transition:background .25s ease,color .25s ease,border-color .25s ease,transform .25s ease,box-shadow .3s ease}
  .pj-hero .live-cta:hover{background:#fff;border-color:#fff;color:#000;transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--green)}
  .pj-hero .live-cta .arr{font:500 13px/1 var(--mono);transition:transform .3s ease}
  .pj-hero .live-cta:hover .arr{transform:translate(4px,-4px)}

  /* Cover */
  .pj-cover{padding:40px;max-width:1600px;margin:0 auto}
  .pj-cover .frame{aspect-ratio:16/9;background:#000;overflow:hidden;position:relative;border:1px solid var(--line)}
  .pj-cover .frame img,.pj-cover .frame video{width:100%;height:100%;object-fit:cover;filter:grayscale(.06) contrast(1.04)}

  /* Grid meta + body */
  .pj-grid{max-width:1400px;margin:0 auto;padding:60px 40px 80px;display:grid;grid-template-columns:260px 1fr;gap:80px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .pj-meta{position:sticky;top:96px;align-self:start}
  .pj-meta dt{font:500 10px/1 var(--mono);letter-spacing:.25em;text-transform:uppercase;color:var(--green);margin-bottom:6px}
  .pj-meta dd{font:400 14px/1.45 var(--sans);color:#fff;margin-bottom:22px}
  .pj-meta dd.mono{font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft)}

  .pj-body .intro{font:400 clamp(17px,1.6vw,22px)/1.55 var(--sans);color:#ddd;max-width:60ch;margin-bottom:56px;padding-bottom:40px;border-bottom:1px solid var(--line)}
  .pj-body .section{margin-bottom:48px;max-width:62ch}
  .pj-body .section:last-child{margin-bottom:0}
  .pj-body .section h2{font:900 clamp(28px,3vw,42px)/.95 var(--display);text-transform:uppercase;letter-spacing:-.02em;margin-bottom:18px;color:#fff}
  .pj-body .section h2 .g{color:var(--green)}
  .pj-body .section p{font:400 15px/1.65 var(--sans);color:#bbb;margin-bottom:14px}
  .pj-body .section p:last-child{margin-bottom:0}

  /* Gallery */
  .pj-gallery{max-width:1600px;margin:0 auto;padding:60px 40px;display:grid;grid-template-columns:repeat(auto-fit, minmax(360px, 1fr));gap:1px;background:var(--line)}
  .pj-gallery .g{background:#0a0a0a;aspect-ratio:4/3;position:relative;overflow:hidden;cursor:zoom-in}
  .pj-gallery .g img,.pj-gallery .g video{width:100%;height:100%;object-fit:cover;filter:grayscale(.08) contrast(1.04);transition:transform .7s cubic-bezier(.2,.8,.2,1)}
  .pj-gallery .g:hover img,.pj-gallery .g:hover video{transform:scale(1.03)}
  .pj-gallery .g .cap{position:absolute;bottom:14px;left:14px;font:500 10px/1 var(--mono);letter-spacing:.2em;text-transform:uppercase;color:#fff;background:rgba(0,0,0,.55);padding:6px 10px;backdrop-filter:blur(4px);pointer-events:none}
  .pj-gallery .g::after{content:"⤢";position:absolute;top:14px;right:14px;font:500 18px/1 var(--mono);color:var(--green);background:rgba(0,0,0,.5);padding:6px 9px;opacity:0;transition:opacity .25s ease;pointer-events:none}
  .pj-gallery .g:hover::after{opacity:1}

  /* Lightbox */
  .pj-lb{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:60px 80px;animation:lbFade .35s ease backwards}
  .pj-lb.is-open{display:flex}
  .pj-lb.is-closing{animation:lbFadeOut .55s ease forwards}
  @keyframes lbFade{from{opacity:0}to{opacity:1}}
  @keyframes lbFadeOut{from{opacity:1}to{opacity:0}}
  .pj-lb .stage{max-width:100%;max-height:100%;display:flex;align-items:center;justify-content:center}
  .pj-lb .stage img,.pj-lb .stage video{max-width:100%;max-height:calc(100vh - 160px);width:auto;height:auto;object-fit:contain;display:block;box-shadow:0 20px 60px rgba(0,0,0,.6);transform-origin:center center;animation:lbZoom .58s cubic-bezier(.2,.8,.2,1) backwards}
  .pj-lb.is-closing .stage img,.pj-lb.is-closing .stage video{animation:lbZoomOut .55s cubic-bezier(.4,0,.6,1) forwards}
  @keyframes lbZoom{from{transform:scale(0);opacity:0;filter:blur(6px)}to{transform:scale(1);opacity:1;filter:blur(0)}}
  @keyframes lbZoomOut{from{transform:scale(1);opacity:1;filter:blur(0)}to{transform:scale(0);opacity:0;filter:blur(6px)}}
  .pj-lb .close,.pj-lb .nav{position:absolute;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.18);color:#fff;cursor:pointer;display:grid;place-items:center;font-family:var(--mono);transition:background .2s ease,color .2s ease,border-color .2s ease;font-weight:500}
  .pj-lb .close:hover,.pj-lb .nav:hover{background:var(--green);color:#000;border-color:var(--green)}
  .pj-lb .close{top:24px;right:24px;width:48px;height:48px;font-size:24px;line-height:1}
  .pj-lb .nav{top:50%;transform:translateY(-50%);width:54px;height:54px;font-size:28px;line-height:1}
  .pj-lb .nav.prev{left:24px}
  .pj-lb .nav.next{right:24px}
  .pj-lb .meta{position:absolute;bottom:24px;left:24px;right:24px;display:flex;justify-content:space-between;align-items:center;gap:20px;font:500 11px/1.4 var(--mono);letter-spacing:.22em;text-transform:uppercase;color:#fff;pointer-events:none}
  .pj-lb .meta .cap{background:rgba(0,0,0,.55);padding:8px 14px;border:1px solid rgba(255,255,255,.12)}
  .pj-lb .meta .counter{color:var(--green);background:rgba(0,0,0,.55);padding:8px 14px;border:1px solid var(--green);white-space:nowrap}
  body.lb-open{overflow:hidden}
  @media (max-width:820px){
    .pj-lb{padding:50px 12px}
    .pj-lb .close{top:14px;right:14px;width:42px;height:42px;font-size:22px}
    .pj-lb .nav{width:44px;height:44px;font-size:24px}
    .pj-lb .nav.prev{left:8px}
    .pj-lb .nav.next{right:8px}
    .pj-lb .meta{bottom:12px;left:12px;right:12px;flex-direction:column;align-items:stretch}
  }

  /* Quote */
  .pj-quote{max-width:980px;margin:0 auto;padding:80px 40px;text-align:center;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .pj-quote blockquote{font:500 clamp(22px,2.6vw,36px)/1.35 var(--sans);color:#fff;margin-bottom:22px;font-style:italic}
  .pj-quote blockquote::before{content:"« ";color:var(--green);font-style:normal}
  .pj-quote blockquote::after{content:" »";color:var(--green);font-style:normal}
  .pj-quote .author{font:500 11px/1 var(--mono);letter-spacing:.28em;text-transform:uppercase;color:var(--dim)}
  .pj-quote .author::before{content:"— ";color:var(--green)}

  /* Next */
  .pj-next{padding:80px 40px;text-align:center;border-bottom:1px solid var(--line)}
  .pj-next .lbl{font:500 11px/1 var(--mono);letter-spacing:.28em;text-transform:uppercase;color:var(--dim);margin-bottom:18px}
  .pj-next .t{font:900 clamp(36px,5.5vw,76px)/.95 var(--display);text-transform:uppercase;letter-spacing:-.03em;color:#fff;transition:color .2s ease}
  .pj-next a:hover .t{color:var(--green)}
  .pj-next .arr{display:inline-block;margin-left:12px;color:var(--green);transition:transform .3s ease}
  .pj-next a:hover .arr{transform:translateX(10px)}

  /* Footer */
  .pj-foot{padding:30px 40px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;font:500 11px/1.4 var(--mono);letter-spacing:.2em;text-transform:uppercase;color:var(--dim)}
  .pj-foot b{color:#fff;font-weight:500}
  .pj-foot a{transition:color .2s ease;margin-left:18px}
  .pj-foot a:hover{color:var(--green)}

  /* 404 */
  .pj-error{padding:180px 40px 120px;text-align:center;max-width:620px;margin:0 auto}
  .pj-error h1{font:900 clamp(80px,14vw,160px)/.9 var(--display);margin-bottom:20px;color:var(--green);letter-spacing:-.04em}
  .pj-error p{font:400 16px/1.55 var(--sans);color:var(--dim);margin-bottom:26px}
  .pj-error a{color:var(--green);border-bottom:1px solid var(--green);padding-bottom:2px}

  @media (max-width:820px){
    .pj-grid{grid-template-columns:1fr;gap:48px;padding:48px 24px 60px}
    .pj-meta{position:static}
    .pj-hero{padding:130px 24px 60px}
    .pj-cover{padding:24px}
    .pj-gallery{padding:40px 24px;grid-template-columns:1fr}
    .pj-quote{padding:60px 24px}
    .pj-next{padding:60px 24px}
    .pj-foot{padding:24px;flex-direction:column;align-items:flex-start}
    .pj-foot a{margin-left:0;margin-right:18px}
    .pj-nav{padding:14px 20px}
  }
</style>
</head>
<body>
<nav class="pj-nav">
  <a class="logo" href="index.html">MAD<span class="g">.</span>MAKERS</a>
  <a class="back" href="index.html#realisations">Retour aux réalisations</a>
</nav>

<main id="pjRoot"></main>

<!-- Lightbox overlay (rendered always, toggled via .is-open) -->
<div class="pj-lb" id="pjLb" role="dialog" aria-modal="true" aria-label="Visualiseur image">
  <button class="close" id="pjLbClose" aria-label="Fermer">×</button>
  <button class="nav prev" id="pjLbPrev" aria-label="Précédent">‹</button>
  <button class="nav next" id="pjLbNext" aria-label="Suivant">›</button>
  <div class="stage" id="pjLbStage"></div>
  <div class="meta">
    <span class="cap" id="pjLbCap"></span>
    <span class="counter" id="pjLbCounter"></span>
  </div>
</div>

<script>window.MM_PROJECT_ID = "01";</script>
<script src="projects.js"></script>
<script>
(() => {
  const esc = (s) => String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

  const params = new URLSearchParams(location.search);
  // Static pre-rendered pages set window.MM_PROJECT_ID inline. Query string is the fallback.
  const id = window.MM_PROJECT_ID || params.get('id');
  const data = (window.MM_PROJECTS || {})[id];
  const root = document.getElementById('pjRoot');

  if(!data){
    root.innerHTML = `
      <section class="pj-error">
        <h1>404</h1>
        <p>Ce projet n'existe pas ou n'a pas encore été publié.</p>
        <a href="index.html#realisations">← Retour aux réalisations</a>
      </section>`;
    document.title = '404 — Mad Makers';
    const r = document.querySelector('meta[name="robots"]');
    if (r) r.setAttribute('content', 'noindex,follow');
    return;
  }

  // Placeholder projects: do not index (thin content, hurts overall site quality signal).
  if (data.status === 'Placeholder') {
    const r = document.querySelector('meta[name="robots"]');
    if (r) r.setAttribute('content', 'noindex,follow,max-image-preview:large');
  }

  // === SEO META INJECTION (per project) ===
  const SITE_ORIGIN = 'https://www.mad-makers.fr';
  const pageUrl  = `${SITE_ORIGIN}/project-${encodeURIComponent(id)}.html`;
  const pageTitle = `${data.title} — Mad Makers`;
  const pageDesc  = (data.subtitle || data.intro || '').slice(0, 160);
  const coverSrc  = data.cover && data.cover.src
    ? (/^https?:/i.test(data.cover.src) ? data.cover.src : `${SITE_ORIGIN}/${data.cover.src}`)
    : `${SITE_ORIGIN}/assets/og-home.jpg`;
  const ogImage = data.cover && data.cover.type === 'video' && data.cover.poster
    ? `${SITE_ORIGIN}/${data.cover.poster}`
    : (data.cover && data.cover.type === 'image' ? coverSrc : `${SITE_ORIGIN}/assets/og-home.jpg`);

  document.title = pageTitle;
  const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el) el.setAttribute('content', val); };
  const setLink = (sel, val) => { const el = document.querySelector(sel); if (el) el.setAttribute('href', val); };
  setMeta('meta[name="description"]', pageDesc);
  setMeta('meta[property="og:title"]', pageTitle);
  setMeta('meta[property="og:description"]', pageDesc);
  setMeta('meta[property="og:url"]', pageUrl);
  setMeta('meta[property="og:image"]', ogImage);
  setMeta('meta[name="twitter:title"]', pageTitle);
  setMeta('meta[name="twitter:description"]', pageDesc);
  setMeta('meta[name="twitter:image"]', ogImage);
  setLink('link[rel="canonical"]', pageUrl);

  // JSON-LD CreativeWork + Breadcrumb for this project
  const ld = document.createElement('script');
  ld.type = 'application/ld+json';
  ld.textContent = JSON.stringify({
    '@context': 'https://schema.org',
    '@graph': [
      {
        '@type': 'CreativeWork',
        '@id': `${pageUrl}#work`,
        'name': data.title,
        'description': pageDesc,
        'image': ogImage,
        'creator': {'@type': 'Organization', 'name': 'Mad Makers', 'url': `${SITE_ORIGIN}/`},
        'dateCreated': data.year || '',
        'inLanguage': 'fr-FR',
        'about': (data.scope || []).join(', ')
      },
      {
        '@type': 'BreadcrumbList',
        'itemListElement': [
          {'@type':'ListItem','position':1,'name':'Accueil','item':`${SITE_ORIGIN}/`},
          {'@type':'ListItem','position':2,'name':'Réalisations','item':`${SITE_ORIGIN}/#realisations`},
          {'@type':'ListItem','position':3,'name':data.title}
        ]
      }
    ]
  });
  document.head.appendChild(ld);

  const coverHtml = data.cover.type === 'video'
    ? `<video src="${esc(data.cover.src)}" muted loop playsinline autoplay preload="metadata"${data.cover.poster ? ` poster="${esc(data.cover.poster)}"` : ''}></video>`
    : `<img src="${esc(data.cover.src)}" alt="${esc(data.title)}"/>`;

  const scopeHtml = (data.scope || []).map(s => `<span>${esc(s)}</span>`).join('');

  const sectionsHtml = (data.sections || []).map(s => `
    <div class="section">
      <h2>${esc(s.title)}<span class="g">.</span></h2>
      <p>${esc(s.body)}</p>
    </div>`).join('');

  const galleryHtml = (data.gallery || []).map(g => `
    <div class="g">
      ${g.type === 'video'
        ? `<video src="${esc(g.src)}" muted loop playsinline autoplay preload="metadata"></video>`
        : `<img src="${esc(g.src)}" alt="${esc(g.caption || '')}" loading="lazy"/>`}
      ${g.caption ? `<div class="cap">${esc(g.caption)}</div>` : ''}
    </div>`).join('');

  const quoteHtml = data.quote ? `
    <section class="pj-quote">
      <blockquote>${esc(data.quote.text)}</blockquote>
      <div class="author">${esc(data.quote.author)}</div>
    </section>` : '';

  const nextProj = data.next ? (window.MM_PROJECTS || {})[data.next] : null;
  const nextHtml = nextProj ? `
    <section class="pj-next">
      <div class="lbl">Projet suivant</div>
      <a href="project-${esc(data.next)}.html">
        <span class="t">${esc(nextProj.title)}</span><span class="arr">→</span>
      </a>
    </section>` : '';

  const statusBadge = data.status ? `<span class="status">${esc(data.status)}</span>` : '';
  const liveCta = data.liveUrl
    ? `<a class="live-cta" href="${esc(data.liveUrl)}" target="_blank" rel="noopener">Voir le site live <span class="arr">↗</span></a>`
    : '';

  root.innerHTML = `
    <section class="pj-hero">
      <div class="idx">
        <span class="n">${esc(data.num)}</span>
        <span>· ${esc(data.year)}</span>
        <span>· ${esc(data.client)}</span>
        ${statusBadge}
      </div>
      <h1>${esc(data.title)}<span class="dot">.</span></h1>
      <p class="sub">${esc(data.subtitle)}</p>
      <div class="scope">${scopeHtml}</div>
      ${liveCta}
    </section>

    <section class="pj-cover">
      <div class="frame">${coverHtml}</div>
    </section>

    <section class="pj-grid">
      <dl class="pj-meta">
        <dt>Client</dt><dd>${esc(data.client)}</dd>
        <dt>Année</dt><dd class="mono">${esc(data.year)}</dd>
        <dt>Rôle</dt><dd>${esc(data.role)}</dd>
        <dt>Durée</dt><dd>${esc(data.duration)}</dd>
        <dt>Stack</dt><dd class="mono">${(data.stack || []).map(esc).join(' · ')}</dd>
      </dl>
      <div class="pj-body">
        <p class="intro">${esc(data.intro)}</p>
        ${sectionsHtml}
      </div>
    </section>

    ${galleryHtml ? `<section class="pj-gallery">${galleryHtml}</section>` : ''}

    ${quoteHtml}
    ${nextHtml}

    <footer class="pj-foot">
      <span>© Mad Makers — <b>Dream it. We make it.</b></span>
      <span>
        <a href="index.html">↑ Accueil</a>
        <a href="index.html#contact">Brief →</a>
      </span>
    </footer>
  `;

  // === LIGHTBOX (gallery zoom) ===
  const gallery = data.gallery || [];
  if(gallery.length){
    const lb       = document.getElementById('pjLb');
    const lbStage  = document.getElementById('pjLbStage');
    const lbCap    = document.getElementById('pjLbCap');
    const lbCount  = document.getElementById('pjLbCounter');
    const lbClose  = document.getElementById('pjLbClose');
    const lbPrev   = document.getElementById('pjLbPrev');
    const lbNext   = document.getElementById('pjLbNext');
    let lbIdx = 0;

    const renderLb = () => {
      const item = gallery[lbIdx];
      lbStage.innerHTML = item.type === 'video'
        ? `<video src="${esc(item.src)}" controls autoplay loop playsinline></video>`
        : `<img src="${esc(item.src)}" alt="${esc(item.caption || '')}"/>`;
      lbCap.textContent   = item.caption || '';
      lbCount.textContent = `${lbIdx + 1} / ${gallery.length}`;
    };

    const openLb = (i) => {
      lbIdx = ((i % gallery.length) + gallery.length) % gallery.length;
      lb.classList.remove('is-closing');
      renderLb();
      lb.classList.add('is-open');
      document.body.classList.add('lb-open');
    };
    let closing = false;
    const closeLb = () => {
      if (closing || !lb.classList.contains('is-open')) return;
      closing = true;
      lb.classList.add('is-closing');
      const finalize = () => {
        closing = false;
        lb.classList.remove('is-open', 'is-closing');
        document.body.classList.remove('lb-open');
        lbStage.innerHTML = ''; // stop any video / release decode
      };
      // wait for the longer of the two animations (.55s on backdrop)
      setTimeout(finalize, 580);
    };
    const step = (dir) => openLb(lbIdx + dir);

    document.querySelectorAll('.pj-gallery .g').forEach((el, i) => {
      el.addEventListener('click', () => openLb(i));
    });
    lbClose.addEventListener('click', closeLb);
    lbPrev.addEventListener('click', () => step(-1));
    lbNext.addEventListener('click', () => step(1));
    // Click on backdrop (not on stage / buttons) closes
    lb.addEventListener('click', (e) => {
      if (e.target === lb) closeLb();
    });
    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (!lb.classList.contains('is-open')) return;
      if (e.key === 'Escape')      closeLb();
      else if (e.key === 'ArrowLeft')  step(-1);
      else if (e.key === 'ArrowRight') step(1);
    });
  }
})();
</script>
</body>
</html>
